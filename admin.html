<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio CMS Admin</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a class="brand" href="index.html"><span class="logo-box" id="adminInitials">JD</span><span>Portfolio CMS</span></a>
      <nav class="admin-nav" aria-label="CMS navigation">
        <button class="active" data-panel="sitePanel">Site Details</button>
        <button data-panel="aboutPanel">About & Hero</button>
        <button data-panel="galleryPanel">Work Gallery</button>
        <button data-panel="skillsPanel">Skills</button>
        <button data-panel="experiencePanel">Experience</button>
        <button data-panel="contactPanel">Contact</button>
        <button data-panel="previewPanel">Preview</button>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1>Portfolio CMS</h1>
          <p>Simple static-site content editor. Changes save to this browser and can be exported as JSON.</p>
        </div>
        <div class="admin-actions">
          <a class="btn secondary" href="index.html" target="_blank" rel="noreferrer">Preview Site</a>
          <button class="btn" id="saveAll">Save Changes</button>
          <button class="btn secondary" id="exportJson">Export JSON</button>
          <label class="btn secondary" for="importJson">Import JSON</label>
          <input class="hidden" type="file" id="importJson" accept="application/json">
          <button class="btn danger" id="resetAll">Reset</button>
        </div>
      </div>

      <p class="status" id="status"></p>

      <section class="panel cms-panel" id="sitePanel">
        <div class="panel-header"><h2>Site Details</h2></div>
        <div class="panel-body form-grid">
          <div class="field"><label>Name</label><input id="siteName" type="text"></div>
          <div class="field"><label>Initials / Logo Text</label><input id="siteInitials" type="text" maxlength="4"></div>
          <div class="field full"><label>Role / Subtitle</label><input id="siteRole" type="text"></div>
          <div class="field full"><label>Intro</label><textarea id="siteIntro"></textarea></div>
          <div class="field full"><label>Footer Text</label><input id="siteFooter" type="text"></div>
        </div>
      </section>

      <section class="panel cms-panel hidden" id="aboutPanel">
        <div class="panel-header"><h2>About & Hero</h2></div>
        <div class="panel-body form-grid">
          <div class="field"><label>Hero Eyebrow</label><input id="heroEyebrow" type="text"></div>
          <div class="field"><label>Hero Button Text</label><input id="heroCta" type="text"></div>
          <div class="field full"><label>Hero Image</label><div class="image-control"><img class="image-preview" id="heroPreview" alt="Hero preview"><div class="upload-box"><span>Replace hero image</span><input id="heroImage" type="file" accept="image/*"></div></div></div>
          <div class="field"><label>About Heading</label><input id="aboutTitle" type="text"></div>
          <div class="field full"><label>About Text</label><textarea id="aboutBody"></textarea></div>
        </div>
      </section>

      <section class="panel cms-panel hidden" id="galleryPanel">
        <div class="panel-header"><h2>Work Gallery</h2><button class="btn small" id="addProject">+ Add Project</button></div>
        <div class="panel-body"><div class="item-list" id="galleryEditor"></div></div>
      </section>

      <section class="panel cms-panel hidden" id="skillsPanel">
        <div class="panel-header"><h2>Skills</h2><button class="btn small" id="addSkill">+ Add Skill</button></div>
        <div class="panel-body"><div class="item-list" id="skillsEditor"></div></div>
      </section>

      <section class="panel cms-panel hidden" id="experiencePanel">
        <div class="panel-header"><h2>Experience</h2><button class="btn small" id="addExperience">+ Add Experience</button></div>
        <div class="panel-body"><div class="item-list" id="experienceEditor"></div></div>
      </section>

      <section class="panel cms-panel hidden" id="contactPanel">
        <div class="panel-header"><h2>Contact</h2></div>
        <div class="panel-body form-grid">
          <div class="field"><label>Email</label><input id="siteEmail" type="email"></div>
          <div class="field"><label>Location</label><input id="siteLocation" type="text"></div>
          <div class="field"><label>GitHub</label><input id="siteGithub" type="text"></div>
          <div class="field"><label>LinkedIn</label><input id="siteLinkedin" type="text"></div>
        </div>
      </section>

      <section class="panel cms-panel hidden" id="previewPanel">
        <div class="panel-header"><h2>Live Preview</h2><button class="btn small" id="refreshPreview">Refresh Preview</button></div>
        <div class="panel-body"><iframe class="preview-frame" id="previewFrame" src="index.html" title="Portfolio preview"></iframe></div>
      </section>
    </main>
  </div>

  <script src="assets/js/defaultContent.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
