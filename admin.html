<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin | Collin Amner</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Admin specific layout adjustments */
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Inter', sans-serif; }
        .admin-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .admin-layout.unlocked { opacity: 1; pointer-events: all; }
        .admin-sidebar { background: var(--surface-color); border-right: 1px solid var(--border-color); padding: 3rem 2rem; }
        .admin-main { padding: 3rem; max-width: 900px; }
        .admin-card { background: var(--bg-color); border: 1px solid var(--border-color); padding: 3rem; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .admin-card h2 { margin-bottom: 2rem; font-size: 1.5rem; color: var(--text-color); border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; }
        textarea.form-control { min-height: 100px; resize: vertical; }
        .admin-notice { border-left: 4px solid var(--text-color); padding: 1.5rem; margin-bottom: 2rem; background: var(--surface-color); }
        .project-editor { border: 1px solid var(--border-color); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface-color); }
        .project-actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" class="form-control" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Enter</button>
                <p id="login-error" style="color: #d93025; margin-top: 1rem; display: none; font-size: 0.85rem;">Incorrect password.</p>
            </form>
        </div>
    </div>

    <div class="admin-layout" id="admin-layout">
        <aside class="admin-sidebar">
            <h2 class="logo">Admin.</h2>
            <nav class="main-nav" style="flex-direction: column; align-items: flex-start; gap: 1rem; margin-top: 3rem;">
                <a href="#sec-hero">Hero Content</a>
                <a href="#sec-about">About & Services</a>
                <a href="#sec-projects">Projects</a>
                <a href="#sec-contact">Contact</a>
                <hr style="width: 100%; border-color: var(--border-color);">
                <a href="index.html" target="_blank" style="color: var(--text-color); font-weight: 600;">View Live Site ↗</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="top-bar">
                <h1>Edit Content</h1>
                <div class="actions" style="display:flex; gap:1rem;">
                    <button id="btn-save-draft" class="btn btn-secondary">Save Draft (Local)</button>
                    <button id="btn-export" class="btn btn-primary">Export content.js</button>
                </div>
            </div>

            <div class="admin-notice">
                <strong>Static Hosting Notice:</strong> Changes here save locally. To publish, click <em>Export content.js</em>, replace the file in your GitHub repo, and commit.
            </div>

            <form id="admin-form">
                </form>
        </main>
    </div>

    <script src="js/content.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
