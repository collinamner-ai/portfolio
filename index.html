<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collin Amner | Senior Designer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-container">
            <div class="logo-lockup">
                <a href="#" class="logo" id="nav-logo">Collin Amner</a>
                <span class="logo-role">Senior Designer</span>
            </div>
            <nav class="main-nav">
                <a href="#work">Index</a>
                <a href="#about">Profile</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-inner">
                <h1 class="hero-title" id="hero-title"></h1>
                <p class="hero-support" id="hero-support"></p>
                <div class="hero-stats" id="hero-stats"></div>
            </div>
        </section>

        <section id="work" class="section archive-section">
            <div class="archive-header">
                <h2 class="section-title">Selected Archive &mdash; 2003–Present</h2>
                <div class="filters" id="project-filters">
                    <button class="filter-btn active" data-filter="All">All</button>
                    </div>
            </div>
            <div class="project-grid" id="project-grid">
                </div>
        </section>

        <section id="about" class="section profile-section">
            <div class="profile-grid">
                <div class="profile-text">
                    <h2 class="section-title">Profile</h2>
                    <p id="about-text" class="lead-text"></p>
                </div>
                <div class="profile-services">
                    <h2 class="section-title">Capabilities</h2>
                    <ul class="service-list" id="services-list"></ul>
                </div>
            </div>
        </section>

        <section id="contact" class="section contact-section">
            <h2 class="massive-cta">Let's Talk.</h2>
            <p id="contact-cta" class="contact-support"></p>
            <div class="contact-links" id="contact-links"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="current-year"></span> Collin Amner.</p>
        <div class="footer-links">
            <span id="footer-socials"></span>
        </div>
    </footer>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true">
        <button class="lightbox-close" aria-label="Close">Close ✕</button>
        <div class="lightbox-nav">
            <button class="lightbox-prev" aria-label="Previous">Prev</button>
            <button class="lightbox-next" aria-label="Next">Next</button>
        </div>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Project view">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <script src="js/content.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
