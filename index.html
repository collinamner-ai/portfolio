<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collin Amner | Senior Designer</title>
  <meta name="description" content="Selected work by Collin Amner, Senior Designer specialising in branding, packaging and digital design." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <a class="logo" href="#top" aria-label="Collin Amner home">Collin Amner</a>
    <nav class="nav" aria-label="Main navigation">
      <a href="#work">Work</a>
      <a href="#info">Info</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main id="main">
    <section class="hero" id="top">
      <p class="label">Senior Designer</p>
      <h1>Branding, packaging and digital design for real-world brands.</h1>
    </section>

    <section class="work" id="work" aria-label="Selected work">
      <div class="work-header">
        <p class="label">Selected work</p>
        <p>Click any project to view the PNG gallery.</p>
      </div>
      <div class="project-grid" id="project-grid"></div>
    </section>

    <section class="info" id="info">
      <div>
        <p class="label">Info</p>
        <p id="about-text"></p>
      </div>
      <div>
        <p class="label">Services</p>
        <ul id="services-list"></ul>
      </div>
    </section>

    <section class="contact" id="contact">
      <p>Interested in the work?</p>
      <a id="contact-link" href="#">Get in touch</a>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Collin Amner</p>
    <p>Aylesbury, UK</p>
  </footer>

  <div class="modal" id="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <button class="modal-close" type="button">Close</button>
    <button class="modal-nav modal-prev" type="button" aria-label="Previous image">←</button>
    <img id="modal-image" src="" alt="" />
    <button class="modal-nav modal-next" type="button" aria-label="Next image">→</button>
    <p id="modal-caption"></p>
  </div>

  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
