<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collin Amner | Selected Work</title>
  <meta name="description" content="Selected visual work by Collin Amner, Senior Designer." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <a class="brand" href="#top" aria-label="Collin Amner home">Collin Amner</a>
    <nav class="nav" aria-label="Main navigation">
      <a href="#projects">Projects</a>
      <a href="#info">Info</a>
      <a class="contact-trigger" href="#contact">Contact</a>
    </nav>
  </header>

  <main id="main">
    <section class="intro" id="top" aria-labelledby="page-title">
      <p class="role">Senior Designer</p>
      <h1 id="page-title">Selected work</h1>
      <p class="intro-line">Branding, packaging, print and digital design.</p>
    </section>

    <section class="projects" id="projects" aria-label="Selected projects"></section>

    <section class="info" id="info">
      <div>
        <p class="section-label">Info</p>
        <h2>Visual-first portfolio for brand, packaging and digital work.</h2>
      </div>
      <p id="about-text"></p>
    </section>

    <section class="contact" id="contact">
      <p class="section-label">Contact</p>
      <a class="button" id="contact-link" href="#">Contact Collin</a>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Collin Amner</p>
    <p>Aylesbury, UK</p>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Project gallery">
    <button class="lightbox-close" type="button" data-close>Close</button>
    <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Previous image">←</button>
    <img id="lightbox-image" src="" alt="">
    <button class="lightbox-arrow lightbox-next" type="button" aria-label="Next image">→</button>
    <p id="lightbox-caption"></p>
  </div>

  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
