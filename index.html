<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clean Portfolio</title>
  <meta name="description" content="A simple clean portfolio website with editable CMS content.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="header">
      <div class="container nav">
        <a class="brand" href="#top" aria-label="Home"><span class="logo-box" data-bind="site.initials"></span><span data-bind="site.name"></span></a>
        <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="navLinks">Menu</button>
        <nav class="nav-links" id="navLinks" aria-label="Main navigation">
          <a href="#about">About</a>
          <a href="#work">Work</a>
          <a href="#skills">Skills</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
          <a href="admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-copy">
          <span class="eyebrow" data-bind="hero.eyebrow"></span>
          <h1 data-bind="site.name"></h1>
          <p class="hero-role" data-bind="site.role"></p>
          <p class="hero-intro" data-bind="site.intro"></p>
          <a class="btn" href="#work" data-bind="hero.cta"></a>
        </div>
        <div class="hero-image"><img data-img="hero.image" alt="Portfolio workspace"></div>
      </section>

      <section class="section" id="about">
        <div class="container section-grid">
          <h2 class="section-title" data-bind="about.title"></h2>
          <div class="lead-box"><p data-bind="about.body"></p></div>
        </div>
      </section>

      <section class="section" id="work">
        <div class="container section-grid">
          <h2 class="section-title">Work Gallery</h2>
          <div>
            <div class="gallery-grid" id="galleryGrid"></div>
          </div>
        </div>
      </section>

      <section class="section" id="skills">
        <div class="container section-grid">
          <h2 class="section-title">Skills</h2>
          <div class="skill-list" id="skillList"></div>
        </div>
      </section>

      <section class="section" id="experience">
        <div class="container section-grid">
          <h2 class="section-title">Experience</h2>
          <div class="timeline" id="experienceList"></div>
        </div>
      </section>

      <section class="section" id="contact">
        <div class="container section-grid">
          <h2 class="section-title">Contact</h2>
          <div class="contact-grid">
            <a class="contact-card" id="emailLink" href="#"></a>
            <span class="contact-card" data-bind="site.location"></span>
            <a class="contact-card" id="githubLink" target="_blank" rel="noreferrer"></a>
            <a class="contact-card" id="linkedinLink" target="_blank" rel="noreferrer"></a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="container" data-bind="site.footer"></div></footer>
  </div>

  <div class="lightbox" id="galleryLightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Expanded project image">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close expanded image">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="Previous project image">‹</button>
    <figure class="lightbox-frame">
      <img id="lightboxImage" src="" alt="">
      <figcaption>
        <strong id="lightboxTitle"></strong>
        <span id="lightboxMeta"></span>
        <p id="lightboxDescription"></p>
      </figcaption>
    </figure>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="Next project image">›</button>
  </div>

  <script src="assets/js/defaultContent.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
