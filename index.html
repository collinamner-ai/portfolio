<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collin Amner | Senior Designer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <header class="mobile-header">
        <div class="logo">Collin Amner</div>
    </header>

    <main class="agency-layout">
        
        <section class="content-column">
            
            <div class="sticky-top">
                <h1 class="logo">Collin Amner.</h1>
                <p class="role-title">Senior Designer & Brand Lead</p>
                <nav class="minimal-nav">
                    <a href="#work">Index</a>
                    <a href="#profile">Profile</a>
                    <a href="#contact">Contact</a>
                </nav>
            </div>

            <div id="work" class="archive-list" id="project-list-container">
                </div>

            <div id="profile" class="profile-block">
                <h2>Profile</h2>
                <p id="about-text" class="lead-text"></p>
                
                <h3 style="margin-top: 3rem; margin-bottom: 1rem;">Specialisms</h3>
                <ul class="capability-list" id="services-list"></ul>
            </div>

            <div id="contact" class="contact-block">
                <h2 class="massive-text">Let's Talk.</h2>
                <p id="contact-cta"></p>
                <div class="contact-actions" id="contact-links"></div>
                
                <footer class="minimal-footer">
                    <p>&copy; <span id="current-year"></span> Collin Amner.</p>
                    <span id="footer-socials"></span>
                </footer>
            </div>

        </section>

        <section class="preview-column">
            <div class="preview-sticky-container">
                <img id="hover-preview-img" src="" alt="Project Preview">
                <div class="preview-overlay">
                    <span id="preview-category" class="preview-meta"></span>
                    <span class="preview-instruction">Click to view gallery</span>
                </div>
            </div>
        </section>

    </main>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true">
        <button class="lightbox-close" aria-label="Close">✕ Close</button>
        <div class="lightbox-nav">
            <button class="lightbox-prev" aria-label="Previous">← Prev</button>
            <button class="lightbox-next" aria-label="Next">Next →</button>
        </div>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Project view">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
    </div>

    <script src="js/content.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
