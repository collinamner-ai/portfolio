<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Packaging Detail &amp; Dieline</title>
  <desc id="desc">Abstract portfolio placeholder artwork for Packaging.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#293241"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <radialGradient id="r" cx="20%" cy="15%" r="70%">
      <stop offset="0" stop-color="#d08a4c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#d08a4c" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="28" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#g)"/>
  <rect width="1200" height="900" fill="url(#r)"/>
  <circle cx="1040" cy="160" r="220" fill="#d08a4c" opacity="0.18"/>
  <circle cx="180" cy="770" r="260" fill="#fff" opacity="0.07"/>
  <g filter="url(#shadow)">
    <rect x="180" y="180" width="840" height="540" rx="44" fill="#ffffff" opacity="0.10" stroke="#ffffff" stroke-opacity="0.24"/>
    <rect x="230" y="230" width="310" height="390" rx="28" fill="#ffffff" opacity="0.92"/>
    <rect x="580" y="230" width="390" height="70" rx="20" fill="#d08a4c" opacity="0.94"/>
    <rect x="580" y="330" width="320" height="24" rx="12" fill="#ffffff" opacity="0.72"/>
    <rect x="580" y="380" width="360" height="24" rx="12" fill="#ffffff" opacity="0.42"/>
    <rect x="580" y="520" width="180" height="90" rx="24" fill="#ffffff" opacity="0.16"/>
    <rect x="790" y="520" width="180" height="90" rx="24" fill="#ffffff" opacity="0.10"/>
  </g>
  <text x="92" y="112" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="5" fill="#ffffff" opacity="0.78">COLLIN AMNER PORTFOLIO</text>
  <text x="92" y="790" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="#ffffff">Packaging</text>
  <text x="96" y="846" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#d08a4c">Detail &amp; Dieline</text>
</svg>